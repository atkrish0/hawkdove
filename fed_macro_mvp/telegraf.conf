[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 5000
  flush_interval = "10s"
  hostname = "fed-macro-mvp"

[[inputs.tail]]
  files = ["/var/log/fed_macro_diagnostics/*/events.jsonl"]
  from_beginning = true
  watch_method = "inotify"
  name_override = "rag_events"
  data_format = "json"
  json_time_key = "ts_utc"
  json_time_format = "2006-01-02T15:04:05Z07:00"
  tag_keys = ["event_type", "stage", "status", "profile_name", "mode", "level"]
  json_string_fields = [
    "run_id",
    "query_id",
    "payload_error",
    "payload_model_name",
    "payload_topic",
    "payload_path",
    "payload_artifact_name"
  ]

[[inputs.docker]]
  endpoint = "unix:///var/run/docker.sock"
  gather_services = false
  timeout = "5s"

[[outputs.socket_writer]]
  address = "tcp://questdb:9009"
  data_format = "influx"
